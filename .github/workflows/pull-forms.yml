name: Pull MS Forms Responses

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 min (GitHub may delay/coalesce under load)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  pull-forms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull form responses
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python scripts/pull_forms.py

      - name: Commit and push new responses
        run: |
          git config user.name "solutions-bot"
          git config user.email "solutions-bot@vantagecircle.com"
          git add intake/solutions-forms/
          if git diff --cached --quiet; then
            echo "No new responses — nothing to commit."
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "intake: $COUNT new form response(s) $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
            echo "✅ Pushed $COUNT new file(s)"
          fi
